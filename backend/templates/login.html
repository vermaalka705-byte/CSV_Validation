<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validation DMS Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>

    <div id="loader">
        <div class="cube-container">
            <div class="cube">
                <div class="face front"></div>
                <div class="face back"></div>
                <div class="face right"></div>
                <div class="face left"></div>
                <div class="face top"></div>
                <div class="face bottom"></div>
            </div>
        </div>
        <p class="loader-text">Initializing Validation Environment...</p>
    </div>

    <div class="animated-bg"></div>
    <div class="grid-overlay"></div>

    <div class="login-wrapper" id="loginWrapper">

        <div class="login-card">

            <div class="logo-section">
                <img src="{{ url_for('static', filename='assets/logo.svg') }}">
                <h1>Validation DMS</h1>
                <p>Enterprise Pharma eQMS Platform</p>
            </div>

            <form id="loginForm">
                <div class="input-group">
                    <input type="email" id="email" required>
                    <label>Email</label>
                </div>

                <div class="input-group">
                    <input type="password" id="password" required>
                    <label>Password</label>
                    <span class="toggle-password" id="togglePassword">👁</span>
                </div>

                <button type="submit">SIGN IN</button>
            </form>

            <p id="errorMsg" style="color:red; text-align:center; margin-top:15px;"></p>

        </div>

    </div>

    <script src="{{ url_for('static', filename='js/login.js') }}"></script>

</body>
</html>
